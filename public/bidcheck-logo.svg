<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="checkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e07a"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <linearGradient id="checkFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e07a"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <filter id="checkGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#checkGradient)" opacity="0.12"/>

  <!-- Outer ring (submission gate) -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#checkGradient)" stroke-width="2.5" stroke-dasharray="240" stroke-dashoffset="60" stroke-linecap="round" filter="url(#checkGlow)">
    <animate attributeName="stroke-dashoffset" values="240;0;60" dur="2s" fill="freeze"/>
  </circle>

  <!-- Document shape -->
  <rect x="32" y="22" width="28" height="36" rx="3" fill="url(#checkFill)" opacity="0.2" stroke="url(#checkGradient)" stroke-width="1.5"/>

  <!-- Document lines -->
  <g stroke="url(#checkGradient)" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <line x1="38" y1="32" x2="54" y2="32"/>
    <line x1="38" y1="38" x2="54" y2="38"/>
    <line x1="38" y1="44" x2="48" y2="44"/>
  </g>

  <!-- Big check mark -->
  <path d="M34 54 L44 64 L66 40"
        fill="none"
        stroke="url(#checkGradient)"
        stroke-width="4.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#checkGlow)"
        opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1s"/>
    <animate attributeName="stroke-dasharray" values="0,50;50,0" dur="0.5s" fill="freeze" begin="1s"/>
  </path>

  <!-- Pulse ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#00e07a" stroke-width="1" opacity="0">
    <animate attributeName="r" values="42;50" dur="1.8s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0.5;0" dur="1.8s" repeatCount="indefinite" begin="2s"/>
  </circle>
</svg>
