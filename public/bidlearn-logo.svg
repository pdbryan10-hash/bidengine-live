<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="learnGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899"/>
      <stop offset="100%" style="stop-color:#BE185D"/>
    </linearGradient>
    <linearGradient id="learnGradient2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F472B6"/>
      <stop offset="100%" style="stop-color:#FBCFE8"/>
    </linearGradient>
    <filter id="learnGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="45" fill="url(#learnGradient)" opacity="0.15"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#learnGradient)" stroke-width="2" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Rising bar chart -->
  <rect x="20" y="65" width="10" height="12" rx="2" fill="url(#learnGradient)" opacity="0.5">
    <animate attributeName="height" values="0;12" dur="0.4s" fill="freeze" begin="0.1s"/>
    <animate attributeName="y" values="77;65" dur="0.4s" fill="freeze" begin="0.1s"/>
  </rect>
  <rect x="34" y="55" width="10" height="22" rx="2" fill="url(#learnGradient)" opacity="0.7">
    <animate attributeName="height" values="0;22" dur="0.4s" fill="freeze" begin="0.3s"/>
    <animate attributeName="y" values="77;55" dur="0.4s" fill="freeze" begin="0.3s"/>
  </rect>
  <rect x="48" y="42" width="10" height="35" rx="2" fill="url(#learnGradient)" opacity="0.85">
    <animate attributeName="height" values="0;35" dur="0.4s" fill="freeze" begin="0.5s"/>
    <animate attributeName="y" values="77;42" dur="0.4s" fill="freeze" begin="0.5s"/>
  </rect>
  <rect x="62" y="28" width="10" height="49" rx="2" fill="url(#learnGradient2)" filter="url(#learnGlow)">
    <animate attributeName="height" values="0;49" dur="0.5s" fill="freeze" begin="0.7s"/>
    <animate attributeName="y" values="77;28" dur="0.5s" fill="freeze" begin="0.7s"/>
  </rect>

  <!-- Trend line -->
  <polyline points="25,65 39,55 53,42 67,28"
            fill="none"
            stroke="#F472B6"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-dasharray="80"
            stroke-dashoffset="80"
            filter="url(#learnGlow)">
    <animate attributeName="stroke-dashoffset" values="80;0" dur="0.8s" fill="freeze" begin="0.9s"/>
  </polyline>

  <!-- Star at peak -->
  <circle cx="67" cy="28" r="4" fill="#FBCFE8" filter="url(#learnGlow)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="1.4s"/>
    <animate attributeName="r" values="2;4;3.5" dur="1.5s" repeatCount="indefinite" begin="1.4s"/>
  </circle>

  <!-- Baseline -->
  <line x1="16" y1="77" x2="78" y2="77" stroke="#EC4899" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Pulse ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#EC4899" stroke-width="1" opacity="0">
    <animate attributeName="r" values="42;48" dur="1.8s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0.5;0" dur="1.8s" repeatCount="indefinite" begin="2s"/>
  </circle>
</svg>
